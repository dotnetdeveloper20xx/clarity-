version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: clarity-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Clarity_Dev_P@ss123
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Clarity_Dev_P@ss123" -Q "SELECT 1" -C -b
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: clarity-api
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=ClarityDb;User Id=sa;Password=Clarity_Dev_P@ss123;TrustServerCertificate=True
      - Jwt__Key=ClarityDockerDevelopmentKey123456789
      - Jwt__Issuer=Clarity
      - Jwt__Audience=ClarityUsers
    depends_on:
      sqlserver:
        condition: service_healthy

volumes:
  sqlserver-data:
